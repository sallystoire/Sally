[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envVars]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
NODE_ENV = "production"
SESSION_SECRET = "${{secret(32)}}"
